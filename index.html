<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bénéfice Pro Bénin</title>
<style>
body{font-family:Arial;margin:0;padding:20px;background:#0b1a13;color:#fff}
.container{max-width:500px;margin:auto}
h1{color:#16a34a;text-align:center}
input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #333;background:#1a2a1f;color:#fff;font-size:16px}
button{width:100%;padding:15px;background:#16a34a;color:#000;border:none;border-radius:8px;font-size:18px;font-weight:bold;margin-top:10px}
.result{background:#1a2a1f;padding:20px;border-radius:8px;margin-top:20px;border:2px solid #16a34a}
</style>
</head>
<body>
<div class="container">
<h1>Bénéfice Pro Bénin</h1>
<p>Calcule ton bénéfice en 3 secondes</p>

<input type="number" id="pv" placeholder="Prix de vente FCFA">
<input type="number" id="cr" placeholder="Coût de revient FCFA">
<input type="number" id="qt" placeholder="Quantité" value="1">

<button onclick="calculer()">Calculer</button>

<div id="res" class="result" style="display:none">
<h3>Résultat</h3>
<p>Bénéfice unitaire : <b id="bu">0</b> FCFA</p>
<p>Bénéfice total : <b id="bt">0</b> FCFA</p>
<p>Marge : <b id="marge">0</b>%</p>
</div>
</div>

<script>
function calculer(){
let pv = parseFloat(document.getElementById('pv').value) || 0;
let cr = parseFloat(document.getElementById('cr').value) || 0;
let qt = parseFloat(document.getElementById('qt').value) || 1;

let bu = pv - cr;
let bt = bu * qt;
let marge = pv > 0 ? (bu/pv*100).toFixed(1) : 0;

document.getElementById('bu').textContent = bu.toLocaleString();
document.getElementById('bt').textContent = bt.toLocaleString();
document.getElementById('marge').textContent = marge;
document.getElementById('res').style.display = 'block';
}
</script>
</body>
</html>
