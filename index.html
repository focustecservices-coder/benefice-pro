<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#16a34a">
<title>Bénéfice Pro - Gestion Commerçant</title>
<style>
:root{--bg:#0b1a13;--card:#121f17;--text:#e7f5ec;--muted:#b6c9be;--accent:#16a34a;--accent2:#22c55e;--danger:#dc2626;--warn:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:var(--bg);color:var(--text);padding:10px;font-size:14px}
.container{max-width:600px;margin:auto}
.hero{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#001b0d;padding:16px;border-radius:12px;margin-bottom:10px;text-align:center}
.card{background:var(--card);border:1px solid #1f2d23;border-radius:12px;padding:14px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
label{display:block;margin-bottom:3px;color:var(--muted);font-size:12px}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #2a3a31;background:#0f1a14;color:var(--text);font-size:14px}
.btn{width:100%;padding:12px;background:var(--accent);color:#001b0d;border:none;border-radius:10px;font-size:14px;font-weight:700;margin:5px 0;cursor:pointer;text-decoration:none;display:block;text-align:center}
.btn-secondary{background:#1f2d23;color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-print{background:var(--warn);color:#000}
.tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto}
.tab{padding:8px 12px;background:#1f2d23;border:none;border-radius:8px;color:var(--muted);font-size:13px;white-space:nowrap}
.tab.active{background:var(--accent);color:#001b0d}
.kpi{display:flex;justify-content:space-between;margin:6px 0;padding:5px 0;border-bottom:1px solid #1f2d23}
.kpi b{color:var(--accent2)}
.kpi.danger b{color:var(--danger)}
.item{background:#0f1a14;padding:8px;border-radius:6px;margin:5px 0;font-size:12px;border-left:3px solid var(--accent)}
.trial{background:#1a2a1f;padding:8px;border-radius:8px;text-align:center;font-size:12px;margin-bottom:8px}
h3{font-size:15px;margin-bottom:8px}
.stat{padding:10px;background:#0f1a14;border-radius:8px;text-align:center}
.stat b{display:block;font-size:20px;color:var(--accent2)}
.stat span{font-size:11px;color:var(--muted)}
@media print{body{background:#fff;color:#000}.no-print{display:none}.card{border:1px solid #ccc}}
</style>
</head>
<body>
<div class="container">
  <div class="hero no-print">
    <h1>Bénéfice Pro Bénin</h1>
    <p>Gestion simple pour commerçant</p>
  </div>

  <div id="trialBox" class="trial no-print"></div>

  <div id="mainApp">
    <!-- DASHBOARD -->
    <div class="card">
      <h3>📊 Tableau de bord</h3>
      <div class="grid3">
        <div class="stat"><b id="d_ventes">0</b><span>Ventes Jour</span></div>
        <div class="stat"><b id="d_benef">0</b><span>Bénéfice Jour</span></div>
        <div class="stat"><b id="d_depens">0</b><span>Dépenses Jour</span></div>
      </div>
      <div class="grid3" style="margin-top:8px">
        <div class="stat"><b id="m_benef">0</b><span>Bénéf. Mois</span></div>
        <div class="stat"><b id="a_benef">0</b><span>Bénéf. Année</span></div>
        <div class="stat"><b id="nb_ventes">0</b><span>Nb Ventes</span></div>
      </div>
    </div>

    <div class="tabs no-print">
      <button class="tab active" onclick="showTab('vente')">Vente</button>
      <button class="tab" onclick="showTab('depense')">Dépense</button>
      <button class="tab" onclick="showTab('stock')">Stock</button>
      <button class="tab" onclick="showTab('rapport')">Rapport</button>
    </div>

    <!-- VENTE -->
    <div id="venteTab" class="card">
      <h3>💰 Nouvelle vente</h3>
      <input type="text" id="v_nom" placeholder="Produit vendu">
      <div class="grid2">
        <input type="number" id="v_pv" placeholder="Prix vente">
        <input type="number" id="v_cr" placeholder="Coût achat">
      </div>
      <input type="number" id="v_qt" placeholder="Quantité" value="1">
      <button class="btn" onclick="addVente()">Enregistrer la vente</button>
    </div>

    <!-- DEPENSE -->
    <div id="depenseTab" class="card" style="display:none">
      <h3>💸 Nouvelle dépense</h3>
      <input type="text" id="d_nom" placeholder="Ex: Loyer, Transport, Salaire">
      <input type="number" id="d_montant" placeholder="Montant FCFA">
      <button class="btn btn-danger" onclick="addDepense()">Enregistrer dépense</button>
      <div id="depenseList" style="margin-top:10px"></div>
    </div>

    <!-- STOCK -->
    <div id="stockTab" class="card" style="display:none">
      <h3>📦 Gestion stock</h3>
      <input type="text" id="s_nom" placeholder="Nom produit">
      <div class="grid2">
        <input type="number" id="s_entree" placeholder="Entrée +">
        <input type="number" id="s_sortie" placeholder="Sortie -">
      </div>
      <button class="btn" onclick="updateStock()">Mettre à jour</button>
      <div id="stockList" style="margin-top:10px"></div>
    </div>

    <!-- RAPPORT -->
    <div id="rapportTab" class="card" style="display:none">
      <h3>📄 Rapport du mois</h3>
      <div id="rapportContent"></div>
      <button class="btn btn-print" onclick="window.print()">🖨️ Imprimer / PDF</button>
      <button class="btn btn-secondary" onclick="exportData()">📤 Sauvegarder données</button>
    </div>
  </div>

  <div id="lockedApp" class="card no-print" style="display:none;text-align:center">
    <h2>🔒 Essai terminé</h2>
    <p>Abonnement : 5000 FCFA / an</p>
    <a href="https://wa.me/22967863289?text=Bonjour, je veux activer Bénéfice Pro" class="btn">💬 WhatsApp 22967863289</a>
    <input type="text" id="codeInput" placeholder="Code d'activation" style="margin-top:10px">
    <button class="btn" onclick="unlock()">Débloquer</button>
  </div>
</div>
