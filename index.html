<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#16a34a">
<title>Bénéfice Pro Bénin</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./logo.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#0b1a13;--card:#121f17;--text:#e7f5ec;--muted:#b6c9be;--accent:#16a34a;--accent2:#22c55e;--danger:#dc2626;--warn:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:var(--bg);color:var(--text);padding:10px;font-size:14px}
.container{max-width:600px;margin:auto}
.hero{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#001b0d;padding:16px;border-radius:12px;margin-bottom:10px;text-align:center;cursor:pointer;user-select:none}
.card{background:var(--card);border:1px solid #1f2d23;border-radius:12px;padding:14px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #2a3a31;background:#0f1a14;color:var(--text);font-size:14px;margin:5px 0}
.btn{width:100%;padding:12px;background:var(--accent);color:#001b0d;border:none;border-radius:10px;font-size:14px;font-weight:700;margin:5px 0;cursor:pointer;text-decoration:none;display:block;text-align:center}
.btn-danger{background:var(--danger);color:#fff}
.btn-print{background:var(--warn);color:#000}
.btn-excel{background:#217346;color:#fff}
.btn-whatsapp{background:#25D366;color:#fff}
.tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto}
.tab{padding:8px 12px;background:#1f2d23;border:none;border-radius:8px;color:var(--muted);font-size:13px;white-space:nowrap;cursor:pointer}
.tab.active{background:var(--accent);color:#001b0d}
.kpi{display:flex;justify-content:space-between;margin:6px 0;padding:5px 0;border-bottom:1px solid #1f2d23}
.kpi b{color:var(--accent2)}
.kpi.danger b{color:var(--danger)}
.item{background:#0f1a14;padding:8px;border-radius:6px;margin:5px 0;font-size:12px;border-left:3px solid var(--accent)}
.trial{background:#1a2a1f;padding:8px;border-radius:8px;text-align:center;font-size:12px;margin-bottom:8px}
h3{font-size:15px;margin-bottom:8px}
.stat{padding:10px;background:#0f1a14;border-radius:8px;text-align:center}
.stat b{display:block;font-size:20px;color:var(--accent2)}
.stat span{font-size:11px;color:var(--muted)}
#chartBox{height:200px;margin-top:10px}
.contact-bar{background:#1a2a1f;padding:10px;border-radius:8px;text-align:center;font-size:13px;margin-bottom:8px;border:2px solid var(--accent)}
.hidden{display:none!important}
@media print{body{background:#fff;color:#000}.no-print{display:none}.card{border:1px solid #ccc}}
</style>
</head>
<body>
<div class="container">
  <div class="hero no-print" id="heroTitle">
    <h1>Bénéfice Pro Bénin</h1>
    <p>Gestion simple - 1000F/mois</p>
  </div>

  <div class="contact-bar no-print">
    📞 Support WhatsApp : <b>22967863289</b>
  </div>

  <div id="trialBox" class="trial no-print"></div>

  <div id="mainApp">
    <div class="card">
      <h3>📊 Aujourd'hui - <span id="dateToday"></span></h3>
      <div class="grid3">
        <div class="stat"><b id="d_ventes">0</b><span>CA Jour</span></div>
        <div class="stat"><b id="d_benef">0</b><span>Bénéf. Jour</span></div>
        <div class="stat"><b id="d_depens">0</b><span>Dépenses</span></div>
      </div>
      <div class="grid3" style="margin-top:8px">
        <div class="stat"><b id="m_benef">0</b><span>Bénéf. Mois</span></div>
        <div class="stat"><b id="a_benef">0</b><span>Bénéf. Année</span></div>
        <div class="stat"><b id="nb_ventes">0</b><span>Nb Ventes</span></div>
      </div>
    </div>

    <div class="tabs no-print">
      <button class="tab active" onclick="showTab('vente',this)">Vente</button>
      <button class="tab" onclick="showTab('depense',this)">Dépense</button>
      <button class="tab" onclick="showTab('stock',this)">Stock</button>
      <button class="tab" onclick="showTab('rapport',this)">Rapport</button>
    </div>

    <div id="venteTab" class="card tab-content">
      <h3>💰 Nouvelle vente</h3>
      <input type="text" id="v_nom" placeholder
