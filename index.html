<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#16a34a">
<title>Bénéfice Pro Bénin - Calculatrice de marge</title>
<style>
:root{--bg:#0b1a13;--card:#121f17;--text:#e7f5ec;--muted:#b6c9be;--accent:#16a34a;--accent2:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,Segoe UI,Arial;background:var(--bg);color:var(--text);padding:16px}
.container{max-width:500px;margin:0 auto}
.hero{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#001b0d;padding:24px;border-radius:16px;margin-bottom:16px}
.hero h1{font-size:28px;margin-bottom:8px}
.card{background:var(--card);border:1px solid #1f2d23;border-radius:16px;padding:20px;margin-bottom:16px}
label{display:block;margin-bottom:6px;color:var(--muted);font-size:14px}
input{width:100%;padding:14px;border-radius:12px;border:1px solid #2a3a31;background:#0f1a14;color:var(--text);font-size:16px;margin-bottom:12px}
.btn{width:100%;padding:16px;background:var(--accent);color:#001b0d;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer}
.btn:active{transform:scale(0.98)}
.result{display:none;background:#0f1a14;border:2px solid var(--accent);border-radius:16px;padding:20px;margin-top:16px}
.result h3{margin-bottom:12px;color:var(--accent)}
.kpi{display:flex;justify-content:space-between;margin:8px 0;padding:8px 0;border-bottom:1px solid #1f2d23}
.kpi:last-child{border:none}
.kpi b{color:var(--accent2);font-size:18px}
.badge{display:inline-block;background:#052e1a;color:#86efac;padding:4px 12px;border-radius:999px;font-size:12px;margin-top:8px}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>Bénéfice Pro Bénin</h1>
    <p>Calcule ta marge et ton bénéfice en 3 secondes</p>
    <span class="badge">100% Gratuit au Bénin</span>
  </div>

  <div class="card">
    <label>Prix de vente (FCFA)</label>
    <input type="number" id="pv" placeholder="Ex: 5000">
    
    <label>Coût de revient (FCFA)</label>
    <input type="number" id="cr" placeholder="Ex: 3000">
    
    <label>Quantité vendue</label>
    <input type="number" id="qt" placeholder="Ex: 10" value="1">
    
    <button class="btn" onclick="calculer()">Calculer mon bénéfice</button>
  </div>

  <div id="res" class="result">
    <h3>📊 Résultat</h3>
    <div class="kpi"><span>Bénéfice unitaire</span><b id="bu">0 FCFA</b></div>
    <div class="kpi"><span>Bénéfice total</span><b id="bt">0 FCFA</b></div>
    <div class="kpi"><span>Marge</span><b id="marge">0%</b></div>
    <div class="kpi"><span>Chiffre d'affaires</span><b id="ca">0 FCFA</b></div>
  </div>
</div>

<script>
function calculer(){
  let pv = parseFloat(document.getElementById('pv').value) || 0;
  let cr = parseFloat(document.getElementById('cr').value) || 0;
  let qt = parseFloat(document.getElementById('qt').value) || 1;
  
  let bu = pv - cr;
  let bt = bu * qt;
  let ca = pv * qt;
  let marge = pv > 0 ? (bu/pv*100).toFixed(1) : 0;
  
  document.getElementById('bu').textContent = bu.toLocaleString() + ' FCFA';
  document.getElementById('bt').textContent = bt.toLocaleString() + ' FCFA';
  document.getElementById('ca').textContent = ca.toLocaleString() + ' FCFA';
  document.getElementById('marge').textContent = marge + '%';
  document.getElementById('res').style.display = 'block';
  document.getElementById('res').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
